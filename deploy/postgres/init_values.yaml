#  dbuserPassword: ""

databases:
  mosip_mockidentitysystem:
    enabled: true
    scriptsDir: mosip_mockidentitysystem  # fixed - must match db_scripts/ folder in repo
    dbName: mosip_mockidentitysystem      # customize e.g. mosip_mockidentitysystem02
    dbUser: mockidentityuser              # customize e.g. mockidentityuser02
    defaultDb: postgres
    host: "postgres-postgresql"
    port: 5432
    su:
      user: postgres
      secret:
        name: postgres-postgresql
        key: postgres-password
    dml: 1
    repoUrl: https://github.com/mosip/esignet-mock-services.git
    branch: develop

  mosip_master:
    enabled: false

  mosip_audit:
    enabled: false

  mosip_keymgr:
    enabled: false

  mosip_kernel:
    enabled: false

  mosip_idmap:
    enabled: false

  mosip_prereg:
    enabled: false

  mosip_idrepo:
    enabled: false

  mosip_ida:
    enabled: false

  mosip_credential:
    enabled: false

  mosip_regprc:
    enabled: false

  mosip_pms:
    enabled: false

  mosip_resident:
    enabled: false

  mosip_hotlist:
    enabled: false
